<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body class="login-body">

<div class="login-box">

<h2 class="login-title">Login</h2>

<form action="/login" method="post">

<input class="login-input" type="text" name="username" placeholder="Type your username" required>

<input class="login-input" type="password" name="password" placeholder="Type your password" required>

<a href="#" class="forgot">Forgot password?</a>

<button class="login-btn">LOGIN</button>

</form>

</div>

</body>
</html>
